name: Ingestão de dados parlamentares

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC diariamente
  workflow_dispatch:        # disparo manual

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      LEGISLATURA_CAMARA: ${{ vars.LEGISLATURA_CAMARA || '57' }}
      LEGISLATURA_SENADO: ${{ vars.LEGISLATURA_SENADO || '57' }}
      PYTHONIOENCODING: "utf-8"     # §6.15
      PYTHONUTF8: "1"               # §6.15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ingestao/requirements.txt

      - name: Instalar dependências
        run: pip install -r ingestao/requirements.txt

      - name: Câmara — deputados e proposições
        id: camara_leg
        run: python ingestao/scripts/ingestao_legislativa.py

      - name: Senado — senadores e proposições
        id: senado_leg
        run: python ingestao/scripts/ingestao_senadores.py

      - name: Câmara — despesas CEAP
        id: camara_ceap
        continue-on-error: true
        run: python ingestao/scripts/ingestao_despesas.py

      - name: Senado — despesas CEAP
        id: senado_ceap
        continue-on-error: true
        run: python ingestao/scripts/ingestao_despesas_senadores.py

      - name: Sumário
        if: always()
        run: |
          echo "camara_leg   : ${{ steps.camara_leg.outcome }}"
          echo "senado_leg   : ${{ steps.senado_leg.outcome }}"
          echo "camara_ceap  : ${{ steps.camara_ceap.outcome }}"
          echo "senado_ceap  : ${{ steps.senado_ceap.outcome }}"
